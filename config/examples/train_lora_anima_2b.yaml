---
# Anima 2B LoRA training (native upstream arch since ostris#860)
#
# Recipe follows the model author's (Circlestone Labs / tdrussell) finetuning
# tips: rank 32, AdamW at 2e-5, LLM adapter frozen (upstream's default —
# set model_kwargs.train_text_conditioner: true to unfreeze, not recommended).
# "A light touch is all you need" — Anima is a base model with no aesthetic
# tuning to overcome. Note: the author's sigmoid_scale 1.3 timestep widening
# from his diffusion-pipe config has no equivalent in upstream's
# implementation; plain sigmoid timestep sampling is the closest available.
job: extension
config:
  name: "my_first_anima_lora_v1"
  process:
    - type: 'sd_trainer'
      training_folder: "output"
      device: cuda:0
#      trigger_word: "p3r5on"
      network:
        type: "lora"
        linear: 32
        linear_alpha: 32
        network_kwargs:
          # mirror sd-scripts' Block-only targeting: no LoRA on the AdaLN
          # modulation linears, patch/time embedders, or final projection
          # (diffusers module names used by upstream's Anima)
          ignore_if_contains:
            - "norm1.linear"
            - "norm2.linear"
            - "norm3.linear"
            - "norm_out.linear"
            - "patch_embed"
            - "time_embed"
            - "proj_out"
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "/path/to/images/folder"
          caption_ext: "txt"
          cache_latents_to_disk: true
          resolution: [ 512, 768, 1024 ]
      train:
        batch_size: 1
        cache_text_embeddings: true
        steps: 2000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        timestep_type: "sigmoid"
        optimizer: "adamw"
        lr: 2e-5
        dtype: bf16
      model:
        # diffusers-layout repo (or a local diffusers-format directory)
        name_or_path: "circlestone-labs/Anima-Base-v1.0-Diffusers"
        arch: "anima"
        # Anima 2B fits comfortably in bf16 — no quantization needed on 16GB+
        quantize: false
        quantize_te: false
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "woman with red hair, playing chess at the park, bomb going off in the background"
          - "a woman holding a coffee cup, in a beanie, sitting at a cafe"
          - "a bear building a log cabin in the snow covered mountains"
          - "hipster man with a beard, building a chair, in a wood shop"
        neg: ""
        seed: 42
        walk_seed: true
        # Anima's reference sampler defaults: CFG 7.5, 30 steps, flow shift 3.0
        guidance_scale: 7.5
        sample_steps: 30
meta:
  name: "[name]"
  version: '1.0'
